<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animated Image</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff; /* Change this to match your site's background */
        }
        canvas {
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <canvas id="displayCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('displayCanvas');
        const ctx = canvas.getContext('2d');
        
        // Load the three frames
        const frames = [new Image(), new Image(), new Image()];
        frames[0].src = 'frame_0.png';
        frames[1].src = 'frame_1.png';
        frames[2].src = 'frame_2.png';

        let currentFrame = 0;
        let loadedCount = 0;

        // Ensure all images are loaded before starting
        frames.forEach(img => {
            img.onload = () => {
                loadedCount++;
                if (loadedCount === 3) animate();
            };
        });

        function animate() {
            // Clear the canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw the current frame
            ctx.drawImage(frames[currentFrame], 0, 0);
            
            // Increment frame index
            currentFrame = (currentFrame + 1) % 3;
            
            // Repeat, adjust the number 50 for faster/slower flicker
            setTimeout(() => requestAnimationFrame(animate), 50); 
        }
    </script>
</body>
</html>
